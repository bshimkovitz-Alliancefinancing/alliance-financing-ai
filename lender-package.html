<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lender Submission Package — Alliance Financing Group</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #1a1a2e;
            background: #f5f5f7;
            line-height: 1.5;
            font-size: 14px;
        }

        /* Toolbar (hidden on print) */
        .toolbar {
            position: sticky;
            top: 0;
            background: #0A1628;
            color: #fff;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .toolbar h1 { font-size: 16px; font-weight: 600; color: #C9A84C; }
        .toolbar .btn {
            background: #C9A84C;
            color: #0A1628;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
        .toolbar .btn:hover { background: #B8932F; }
        .toolbar .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            margin-right: 8px;
        }

        /* Page container */
        .page {
            max-width: 820px;
            margin: 32px auto;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 48px;
        }

        /* Cover page */
        .cover {
            text-align: center;
            padding: 60px 0 40px;
            border-bottom: 3px solid #C9A84C;
            margin-bottom: 40px;
        }
        .cover h1 {
            color: #0A1628;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .cover .subtitle {
            color: #64748B;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .cover .package-title {
            color: #C9A84C;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        .cover .summary-box {
            background: #F8FAFC;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 24px;
            text-align: left;
            max-width: 560px;
            margin: 0 auto;
        }
        .cover .summary-box h3 {
            color: #0A1628;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .cover .summary-box table {
            width: 100%;
            font-size: 13px;
        }
        .cover .summary-box td {
            padding: 6px 0;
            border-bottom: 1px solid #F1F5F9;
        }
        .cover .summary-box td:first-child {
            color: #64748B;
            font-weight: 600;
            padding-right: 16px;
            width: 38%;
        }
        .cover .summary-box td:last-child { color: #1a1a2e; }
        .cover .summary-box tr:last-child td { border-bottom: none; }

        /* Section */
        section {
            margin-bottom: 48px;
            break-inside: avoid-page;
        }
        section h2 {
            color: #0A1628;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 2px solid #C9A84C;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        section h3 {
            color: #0A1628;
            font-size: 15px;
            font-weight: 700;
            margin: 24px 0 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Data tables */
        table.data {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 13px;
        }
        table.data td {
            padding: 10px 14px;
            border: 1px solid #E5E7EB;
        }
        table.data td:first-child {
            background: #F8FAFC;
            color: #64748B;
            font-weight: 600;
            width: 40%;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-signed { background: #DCFCE7; color: #166534; }
        .badge-pending { background: #FEF3C7; color: #92400E; }

        /* PG section wrapper */
        .pg-addendum {
            background: #FAFAFA;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 24px;
            break-inside: avoid-page;
        }
        .pg-addendum .pg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #E5E7EB;
        }
        .pg-addendum .pg-header h4 {
            color: #0A1628;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .signature-line {
            background: #F0FDF4;
            border-left: 4px solid #10B981;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 13px;
            color: #166534;
        }
        .signature-line strong { color: #14532D; }

        /* Footer / disclaimer */
        .footer-disclaimer {
            margin-top: 56px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
            font-size: 11px;
            color: #94A3B8;
            text-align: center;
            line-height: 1.6;
        }

        /* Loading / error states */
        .status-card {
            text-align: center;
            padding: 80px 24px;
            color: #64748B;
        }
        .status-card h2 { color: #0A1628; margin-bottom: 12px; }
        .status-card .error { color: #DC2626; }

        /* Print styles */
        @media print {
            body { background: #fff; font-size: 11pt; }
            .toolbar { display: none; }
            .page {
                margin: 0;
                max-width: none;
                box-shadow: none;
                padding: 24px;
            }
            section, .pg-addendum { break-inside: avoid-page; }
            .cover { break-after: page; }
            .toc { break-after: page; }
            section h2 { break-after: avoid; }
        }
            /* Credit review section (Phase 2D) */
        .cr-section { page-break-before: always; padding-top: 8px; }
        .cr-section h2 { color: #1B3A5C; font-size: 18px; font-weight: 700; border-bottom: 2px solid #C5A55A; padding-bottom: 6px; margin: 0 0 14px; letter-spacing: 0.5px; text-transform: uppercase; }
        .cr-subsection { margin-bottom: 16px; page-break-inside: avoid; }
        .cr-subsection h3 { color: #1B3A5C; font-size: 13px; font-weight: 700; border-bottom: 1px solid #C5A55A; padding-bottom: 3px; margin-bottom: 8px; letter-spacing: 0.4px; text-transform: uppercase; }
        .cr-subsection p { margin-bottom: 6px; line-height: 1.5; }
        .cr-subsection ul { margin: 4px 0 4px 20px; }
        .cr-subsection ul li { margin-bottom: 3px; }
        .cr-subsection pre { white-space: pre-wrap; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; margin: 4px 0; padding: 8px 10px; background: #F5F5F5; border-left: 2px solid #E5E7EB; }
        .cr-meta { font-size: 10px; color: #6B7280; margin-bottom: 14px; padding: 6px 10px; background: #F5F5F5; border-radius: 4px; }
        .cr-empty { padding: 20px; background: #FFFBF4; border: 1px dashed #FBBF24; border-radius: 4px; color: #B45309; font-size: 12px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="toolbar">
        <h1>Alliance Lender Package Generator</h1>
        <div>
            <button class="btn btn-outline" onclick="window.close()">Close</button>
            <button class="btn" onclick="window.print()">Print / Save as PDF</button>
        </div>
    </div>

    <div class="page" id="packageRoot">
        <div class="status-card" id="loadingState">
            <h2>Loading lender package…</h2>
            <p>Querying application, signed addendums, and supporting documents.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uernphejrcsicnkobsdw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlcm5waGVqcmNzaWNua29ic2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzU3ODksImV4cCI6MjA4NjUxMTc4OX0.A2YN3gkaYwR_9nyE3OkWl5Io9tfxe8lTgC913stXmUI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const dealId = urlParams.get('deal_id');


        async function renderDealPicker() {
            const root = document.getElementById('packageRoot');
            root.innerHTML = '<div class="status-card"><h2>Select a deal</h2><p style="color:#64748B;margin-bottom:20px;">Pick the deal you want to bundle into a lender submission package.</p><select id="dealPicker" style="width:100%;max-width:600px;padding:10px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:14px;background:#fff;"><option value="">— Select a deal —</option></select><div style="margin-top:16px;"><button id="goBtn" disabled style="background:#0A1628;color:#fff;border:none;padding:11px 22px;border-radius:6px;font-weight:600;cursor:pointer;">Open package</button> <a href="/admin.html" style="margin-left:12px;color:#64748B;text-decoration:none;">Cancel</a></div></div>';

            const { data, error } = await sb.from('deals')
                .select('id, deal_number, company_name, product_type, deal_amount, status, is_archived')
                .or('is_archived.is.null,is_archived.eq.false')
                .not('status', 'in', '("Declined","Withdrawn")')
                .order('created_at', { ascending: false })
                .limit(200);
            if (error) {
                root.innerHTML = '<div class="status-card"><h2 class="error">Couldn\'t load deals</h2><p>' + esc(error.message) + '</p></div>';
                return;
            }
            const sel = document.getElementById('dealPicker');
            (data || []).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id;
                const amt = d.deal_amount ? '$' + Number(d.deal_amount).toLocaleString() : '—';
                opt.textContent = (d.deal_number || '—') + ' · ' + (d.company_name || '—') + ' · ' + (d.product_type || '') + ' · ' + amt + ' · ' + d.status;
                sel.appendChild(opt);
            });
            const goBtn = document.getElementById('goBtn');
            sel.addEventListener('change', () => { goBtn.disabled = !sel.value; });
            goBtn.addEventListener('click', () => { if (sel.value) window.location.href = '/lender-package.html?deal_id=' + sel.value; });
        }

        function showError(msg) {
            document.getElementById('packageRoot').innerHTML =
                '<div class="status-card"><h2 class="error">Couldn\'t load package</h2><p>' + msg + '</p></div>';
        }

        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function fmtMoney(v) {
            if (!v) return '—';
            var n = Number(String(v).replace(/[^\d.-]/g, ''));
            if (isNaN(n) || n === 0) return esc(v);
            return '$' + n.toLocaleString();
        }

        function fmtDate(d) {
            if (!d) return '—';
            try {
                return new Date(d).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch (e) { return esc(d); }
        }

        function renderApplicationSection(app, deal) {
            const fd = app.form_data || {};
            const rows = [
                ['Application ID', fd.applicationId || app.id],
                ['Form Type', (fd.formType || app.form_type || '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())],
                ['Submitted', fmtDate(app.submitted_at)],
                ['Status', deal ? deal.status : app.status],
                ['Referral Source', fd.referralSource || app.referral_slug || '—'],
            ];
            let html = '<section><h2>1. Deal Summary</h2><table class="data">';
            rows.forEach(r => {
                html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table></section>';

            // Business & Financial
            html += '<section><h2>2. Business &amp; Financial Information</h2>';
            html += '<h3>Business Details</h3>';
            html += '<table class="data">';
            const biz = [
                ['Legal Business Name', fd.legalName || app.business_name],
                ['Trade Name', fd.tradeName],
                ['Business Structure', fd.structure],
                ['Industry', fd.industry],
                ['Time in Business', fd.timeInBusiness || app.time_in_business],
                ['Number of Employees', fd.numEmployees],
                ['Business Address', fd.bizAddress + (fd.bizCity ? ', ' + fd.bizCity : '') + (fd.bizProv ? ', ' + fd.bizProv : '') + (fd.bizPostal ? ' ' + fd.bizPostal : '')],
                ['Country', fd.bizCountry],
                ['Business Phone', fd.bizPhone || app.phone],
                ['Business Email', fd.bizEmail || app.email],
                ['GST / Federal ID', fd.gstFedId],
            ];
            biz.forEach(r => {
                if (r[1]) html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table>';

            html += '<h3>Financial Profile</h3>';
            html += '<table class="data">';
            const fin = [
                ['Annual Revenue', fmtMoney(fd.annualRevenue || app.annual_revenue)],
                ['Monthly Revenue', fmtMoney(fd.monthlyRevenue)],
                ['Monthly Card Sales', fmtMoney(fd.cardSales)],
                ['Bank Name', fd.bankName],
                ['Credit Card Processor', fd.processor],
                ['Advance / Funding Requested', fmtMoney(fd.advanceAmount || app.funding_amount_requested)],
                ['Purpose of Funds', fd.fundsPurpose],
                ['Existing Loans?', fd.existingLoans],
                ['Loan Payment Amount', fmtMoney(fd.loanPayment)],
                ['Current MCA?', fd.currentMCA],
                ['MCA Balance', fmtMoney(fd.mcaBalance)],
                ['Tax Liens?', fd.taxLiens],
                ['Tax Arrears?', fd.taxArrears],
            ];
            fin.forEach(r => {
                if (r[1] && r[1] !== '—') html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table></section>';

            // Application-level signature
            if (fd.signatureName) {
                html += '<section><h2>3. Application Signature</h2>';
                html += '<table class="data">';
                html += '<tr><td>Signed by</td><td>' + esc(fd.signatureName) + '</td></tr>';
                html += '<tr><td>Signed at</td><td>' + fmtDate(fd.signatureTimestamp) + '</td></tr>';
                html += '<tr><td>Authorization</td><td>Applicant confirmed information is true and complete, authorized credit checks and lender syndication per PIPEDA / ESIGN / UETA.</td></tr>';
                html += '</table></section>';
            }

            return html;
        }

        function renderPGSection(signingDocs) {
            if (!signingDocs || signingDocs.length === 0) {
                return '<section><h2>4. Personal Guarantees</h2>' +
                       '<div class="status-card" style="padding:40px;background:#FEF3C7;border-radius:8px;">' +
                       '<p style="color:#92400E;font-weight:600;">No signed Personal Guarantee Addendums on file for this deal.</p>' +
                       '<p style="margin-top:8px;color:#92400E;font-size:13px;">For MCA submissions, PG addendums should be sent to each guarantor before submission to lender.</p>' +
                       '</div></section>';
            }

            let html = '<section><h2>4. Personal Guarantees (' + signingDocs.length + ')</h2>';

            signingDocs.forEach((doc, i) => {
                html += '<div class="pg-addendum">';
                html += '<div class="pg-header">';
                html += '<h4>Guarantor ' + (i + 1) + ' — ' + esc(doc.sent_to_name || 'Unnamed') + '</h4>';
                const statusClass = doc.status === 'signed' ? 'badge-signed' : 'badge-pending';
                html += '<span class="badge ' + statusClass + '">' + esc(doc.status || 'unknown') + '</span>';
                html += '</div>';

                // Show the populated addendum HTML (already rendered with guarantor's data)
                if (doc.populated_html) {
                    html += '<div style="margin-top:8px;">' + doc.populated_html + '</div>';
                } else {
                    html += '<p style="color:#64748B;padding:16px;">Document HTML not available.</p>';
                }

                if (doc.status === 'signed') {
                    html += '<div class="signature-line">';
                    html += '<strong>Signed by ' + esc(doc.sent_to_name || '') + '</strong> — ' + esc(doc.sent_to_email || '') + '<br>';
                    html += 'Signing token: <code>' + esc(doc.signing_token || '') + '</code>';
                    html += '</div>';
                }
                html += '</div>';
            });

            html += '</section>';
            return html;
        }

        function renderCoverPage(app, deal) {
            const fd = app.form_data || {};
            return '<div class="cover">' +
                '<h1>Alliance Financing Group Ltd.</h1>' +
                '<div class="subtitle">Commercial Finance Brokerage · Est. 1989</div>' +
                '<div class="package-title">Lender Submission Package</div>' +
                '<div class="summary-box">' +
                '<h3>Deal Summary</h3>' +
                '<table>' +
                '<tr><td>Application ID</td><td>' + esc(fd.applicationId || app.id) + '</td></tr>' +
                '<tr><td>Business</td><td>' + esc(fd.legalName || app.business_name || '') + '</td></tr>' +
                '<tr><td>Financing Type</td><td>' + esc((fd.formType || app.form_type || '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())) + '</td></tr>' +
                '<tr><td>Amount Requested</td><td>' + fmtMoney(fd.advanceAmount || app.funding_amount_requested) + '</td></tr>' +
                '<tr><td>Status</td><td>' + esc(deal ? deal.status : app.status) + '</td></tr>' +
                '<tr><td>Package Generated</td><td>' + fmtDate(new Date().toISOString()) + '</td></tr>' +
                '</table>' +
                '</div>' +
                '<p style="margin-top:32px;color:#64748B;font-size:12px;">Confidential — prepared by Alliance Financing Group Ltd. for prospective lender review.</p>' +
                '</div>';
        }

        async function fetchCreditReview(dealId) {
            // Phase 2D — pull most recent credit review draft for this deal
            const { data, error } = await sb.from('credit_review_drafts')
                .select('id, ai_response, edited_response, model_version, input_tokens, output_tokens, cost_usd, created_at, status')
                .eq('deal_id', dealId)
                .order('created_at', { ascending: false })
                .limit(1)
                .maybeSingle();
            if (error) console.warn('Credit review lookup warning:', error.message);
            return data || null;
        }

        function renderCreditReviewSection(draft) {
            if (!draft) {
                return '<div class="cr-section"><h2>Credit Review</h2><div class="cr-empty">No credit review drafted for this deal yet. <a href="/credit-review-draft.html" style="color:#1B3A5C;font-weight:600;">Open the AI Credit Review Draft tool</a> to generate one.</div></div>';
            }
            const resp = draft.edited_response || draft.ai_response || {};
            if (resp._parse_error) {
                return '<div class="cr-section"><h2>Credit Review</h2><div class="cr-empty">The current draft has an unparseable AI response. Please regenerate via <a href="/credit-review-draft.html" style="color:#1B3A5C;font-weight:600;">the credit review tool</a>.</div></div>';
            }

            // Canonical-7 lender-facing sections only (matches credit-review skill spec)
            // Format: [key, label, fallbackKey] — fallback supports old-format drafts
            const sections = [
                ['executive_summary', 'Executive Summary'],
                ['transaction_overview', 'Transaction Overview', 'transaction_structure'],
                ['equipment_or_use_of_funds', 'Equipment / Use of Funds'],
                ['company_overview', 'Company Overview', 'borrower_overview'],
                ['financial_summary', 'Financial Summary (with Adjusted EBITDA Reconciliation)'],
                ['audit_history', 'Audit History'],
                ['existing_debt_summary', 'Existing Debt Summary'],
                ['personal_guarantor_summary', 'Personal Guarantor'],
                ['attachments', 'Attachments'],
            ];

            const renderSection = (key, label, fb) => {
                const v = resp[key] !== undefined ? resp[key] : (fb ? resp[fb] : undefined);
                if (v == null || (Array.isArray(v) && v.length === 0)) return '';
                if (typeof v === 'string' && !v.trim()) return '';
                let body;
                if (Array.isArray(v)) {
                    body = '<ul>' + v.map(item => '<li>' + esc(String(item)) + '</li>').join('') + '</ul>';
                } else {
                    const text = String(v).trim();
                    const paras = text.split(/\n\n+/).map(p => {
                        const hasIndent = /^\s{2,}/m.test(p) || p.includes('Net Income') || /Facility \d+:/i.test(p);
                        if (hasIndent) return '<pre>' + esc(p) + '</pre>';
                        return '<p>' + esc(p).replace(/\n/g, '<br>') + '</p>';
                    }).join('');
                    body = paras;
                }
                return '<div class="cr-subsection"><h3>' + esc(label) + '</h3>' + body + '</div>';
            };

            const draftDate = new Date(draft.created_at).toLocaleString();
            const sectionHtml = sections.map(([k, l, fb]) => renderSection(k, l, fb)).join('');

            return '<div class="cr-section">' +
                '<h2>Credit Review</h2>' +
                '<div class="cr-meta">Drafted ' + esc(draftDate) + ' · Status: ' + esc(draft.status) + ' · Model: ' + esc(draft.model_version || '') + '</div>' +
                sectionHtml +
                '</div>';
        }

        async function loadPackage() {
            if (!dealId) {
                renderDealPicker();
                return;
            }

            try {
                // Query the deal
                const { data: deal, error: dealErr } = await sb
                    .from('deals')
                    .select('*')
                    .eq('id', dealId)
                    .single();
                if (dealErr) throw new Error('Deal lookup failed: ' + dealErr.message);
                if (!deal) throw new Error('No deal found for deal_id ' + dealId);

                // Query the application
                const { data: app, error: appErr } = await sb
                    .from('applications')
                    .select('*')
                    .eq('id', deal.application_id)
                    .single();
                if (appErr) throw new Error('Application lookup failed: ' + appErr.message);
                if (!app) throw new Error('No application found for this deal');

                // Query signing_documents for this deal (all statuses, display shows what's signed)
                const { data: signingDocs, error: sdErr } = await sb
                    .from('signing_documents')
                    .select('*')
                    .eq('deal_id', dealId)
                    .order('created_at', { ascending: true });
                if (sdErr) console.warn('Signing documents lookup warning: ' + sdErr.message);

                // Phase 2D — pull credit review draft for this deal (if any)
                const creditReviewDraft = await fetchCreditReview(dealId);

                // Build the package HTML
                let html = renderCoverPage(app, deal);
                html += renderCreditReviewSection(creditReviewDraft);
                html += renderApplicationSection(app, deal);
                html += renderPGSection(signingDocs || []);

                // Footer disclaimer
                html += '<div class="footer-disclaimer">' +
                    'Alliance Financing Group Ltd. is a commercial finance brokerage, not a direct lender.<br>' +
                    'All financing is subject to lender underwriting, approval, and credit requirements.<br>' +
                    'Alliance Financing Group Ltd. · 1-877-660-3660 · alliancefinancing.com' +
                    '</div>';

                document.getElementById('packageRoot').innerHTML = html;
                document.title = 'Lender Package — ' + (app.form_data?.legalName || app.business_name || 'Alliance Financing Group');
            } catch (err) {
                console.error(err);
                showError(err.message || 'Unknown error');
            }
        }

        loadPackage();
    </script>
</body>
