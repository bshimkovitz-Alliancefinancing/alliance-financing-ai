<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lender Submission Package — Alliance Financing Group</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #1a1a2e;
            background: #f5f5f7;
            line-height: 1.5;
            font-size: 14px;
        }

        /* Toolbar (hidden on print) */
        .toolbar {
            position: sticky;
            top: 0;
            background: #0A1628;
            color: #fff;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .toolbar h1 { font-size: 16px; font-weight: 600; color: #C9A84C; }
        .toolbar .btn {
            background: #C9A84C;
            color: #0A1628;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
        .toolbar .btn:hover { background: #B8932F; }
        .toolbar .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            margin-right: 8px;
        }

        /* Page container */
        .page {
            max-width: 820px;
            margin: 32px auto;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 48px;
        }

        /* Cover page */
        .cover {
            text-align: center;
            padding: 60px 0 40px;
            border-bottom: 3px solid #C9A84C;
            margin-bottom: 40px;
        }
        .cover h1 {
            color: #0A1628;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .cover .subtitle {
            color: #64748B;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .cover .package-title {
            color: #C9A84C;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        .cover .summary-box {
            background: #F8FAFC;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 24px;
            text-align: left;
            max-width: 560px;
            margin: 0 auto;
        }
        .cover .summary-box h3 {
            color: #0A1628;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .cover .summary-box table {
            width: 100%;
            font-size: 13px;
        }
        .cover .summary-box td {
            padding: 6px 0;
            border-bottom: 1px solid #F1F5F9;
        }
        .cover .summary-box td:first-child {
            color: #64748B;
            font-weight: 600;
            padding-right: 16px;
            width: 38%;
        }
        .cover .summary-box td:last-child { color: #1a1a2e; }
        .cover .summary-box tr:last-child td { border-bottom: none; }

        /* Section */
        section {
            margin-bottom: 48px;
            break-inside: avoid-page;
        }
        section h2 {
            color: #0A1628;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 2px solid #C9A84C;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        section h3 {
            color: #0A1628;
            font-size: 15px;
            font-weight: 700;
            margin: 24px 0 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Data tables */
        table.data {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 13px;
        }
        table.data td {
            padding: 10px 14px;
            border: 1px solid #E5E7EB;
        }
        table.data td:first-child {
            background: #F8FAFC;
            color: #64748B;
            font-weight: 600;
            width: 40%;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-signed { background: #DCFCE7; color: #166534; }
        .badge-pending { background: #FEF3C7; color: #92400E; }

        /* PG section wrapper */
        .pg-addendum {
            background: #FAFAFA;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 24px;
            break-inside: avoid-page;
        }
        .pg-addendum .pg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #E5E7EB;
        }
        .pg-addendum .pg-header h4 {
            color: #0A1628;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .signature-line {
            background: #F0FDF4;
            border-left: 4px solid #10B981;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 13px;
            color: #166534;
        }
        .signature-line strong { color: #14532D; }

        /* Footer / disclaimer */
        .footer-disclaimer {
            margin-top: 56px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
            font-size: 11px;
            color: #94A3B8;
            text-align: center;
            line-height: 1.6;
        }

        /* Loading / error states */
        .status-card {
            text-align: center;
            padding: 80px 24px;
            color: #64748B;
        }
        .status-card h2 { color: #0A1628; margin-bottom: 12px; }
        .status-card .error { color: #DC2626; }

        /* Print styles */
        @media print {
            body { background: #fff; font-size: 11pt; }
            .toolbar { display: none; }
            .page {
                margin: 0;
                max-width: none;
                box-shadow: none;
                padding: 24px;
            }
            section, .pg-addendum { break-inside: avoid-page; }
            .cover { break-after: page; }
            .toc { break-after: page; }
            section h2 { break-after: avoid; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="toolbar">
        <h1>Alliance Lender Package Generator</h1>
        <div>
            <button class="btn btn-outline" onclick="window.close()">Close</button>
            <button class="btn" onclick="window.print()">Print / Save as PDF</button>
        </div>
    </div>

    <div class="page" id="packageRoot">
        <div class="status-card" id="loadingState">
            <h2>Loading lender package…</h2>
            <p>Querying application, signed addendums, and supporting documents.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uernphejrcsicnkobsdw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlcm5waGVqcmNzaWNua29ic2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzU3ODksImV4cCI6MjA4NjUxMTc4OX0.A2YN3gkaYwR_9nyE3OkWl5Io9tfxe8lTgC913stXmUI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const dealId = urlParams.get('deal_id');

        function showError(msg) {
            document.getElementById('packageRoot').innerHTML =
                '<div class="status-card"><h2 class="error">Couldn\'t load package</h2><p>' + msg + '</p></div>';
        }

        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function fmtMoney(v) {
            if (!v) return '—';
            var n = Number(String(v).replace(/[^\d.-]/g, ''));
            if (isNaN(n) || n === 0) return esc(v);
            return '$' + n.toLocaleString();
        }

        function fmtDate(d) {
            if (!d) return '—';
            try {
                return new Date(d).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch (e) { return esc(d); }
        }

        function renderApplicationSection(app, deal) {
            const fd = app.form_data || {};
            const rows = [
                ['Application ID', fd.applicationId || app.id],
                ['Form Type', (fd.formType || app.form_type || '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())],
                ['Submitted', fmtDate(app.submitted_at)],
                ['Status', deal ? deal.status : app.status],
                ['Referral Source', fd.referralSource || app.referral_slug || '—'],
            ];
            let html = '<section><h2>1. Deal Summary</h2><table class="data">';
            rows.forEach(r => {
                html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table></section>';

            // Business & Financial
            html += '<section><h2>2. Business &amp; Financial Information</h2>';
            html += '<h3>Business Details</h3>';
            html += '<table class="data">';
            const biz = [
                ['Legal Business Name', fd.legalName || app.business_name],
                ['Trade Name', fd.tradeName],
                ['Business Structure', fd.structure],
                ['Industry', fd.industry],
                ['Time in Business', fd.timeInBusiness || app.time_in_business],
                ['Number of Employees', fd.numEmployees],
                ['Business Address', fd.bizAddress + (fd.bizCity ? ', ' + fd.bizCity : '') + (fd.bizProv ? ', ' + fd.bizProv : '') + (fd.bizPostal ? ' ' + fd.bizPostal : '')],
                ['Country', fd.bizCountry],
                ['Business Phone', fd.bizPhone || app.phone],
                ['Business Email', fd.bizEmail || app.email],
                ['GST / Federal ID', fd.gstFedId],
            ];
            biz.forEach(r => {
                if (r[1]) html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table>';

            html += '<h3>Financial Profile</h3>';
            html += '<table class="data">';
            const fin = [
                ['Annual Revenue', fmtMoney(fd.annualRevenue || app.annual_revenue)],
                ['Monthly Revenue', fmtMoney(fd.monthlyRevenue)],
                ['Monthly Card Sales', fmtMoney(fd.cardSales)],
                ['Bank Name', fd.bankName],
                ['Credit Card Processor', fd.processor],
                ['Advance / Funding Requested', fmtMoney(fd.advanceAmount || app.funding_amount_requested)],
                ['Purpose of Funds', fd.fundsPurpose],
                ['Existing Loans?', fd.existingLoans],
                ['Loan Payment Amount', fmtMoney(fd.loanPayment)],
                ['Current MCA?', fd.currentMCA],
                ['MCA Balance', fmtMoney(fd.mcaBalance)],
                ['Tax Liens?', fd.taxLiens],
                ['Tax Arrears?', fd.taxArrears],
            ];
            fin.forEach(r => {
                if (r[1] && r[1] !== '—') html += '<tr><td>' + esc(r[0]) + '</td><td>' + esc(r[1]) + '</td></tr>';
            });
            html += '</table></section>';

            // Application-level signature
            if (fd.signatureName) {
                html += '<section><h2>3. Application Signature</h2>';
                html += '<table class="data">';
                html += '<tr><td>Signed by</td><td>' + esc(fd.signatureName) + '</td></tr>';
                html += '<tr><td>Signed at</td><td>' + fmtDate(fd.signatureTimestamp) + '</td></tr>';
                html += '<tr><td>Authorization</td><td>Applicant confirmed information is true and complete, authorized credit checks and lender syndication per PIPEDA / ESIGN / UETA.</td></tr>';
                html += '</table></section>';
            }

            return html;
        }

        function renderPGSection(signingDocs) {
            if (!signingDocs || signingDocs.length === 0) {
                return '<section><h2>4. Personal Guarantees</h2>' +
                       '<div class="status-card" style="padding:40px;background:#FEF3C7;border-radius:8px;">' +
                       '<p style="color:#92400E;font-weight:600;">No signed Personal Guarantee Addendums on file for this deal.</p>' +
                       '<p style="margin-top:8px;color:#92400E;font-size:13px;">For MCA submissions, PG addendums should be sent to each guarantor before submission to lender.</p>' +
                       '</div></section>';
            }

            let html = '<section><h2>4. Personal Guarantees (' + signingDocs.length + ')</h2>';

            signingDocs.forEach((doc, i) => {
                html += '<div class="pg-addendum">';
                html += '<div class="pg-header">';
                html += '<h4>Guarantor ' + (i + 1) + ' — ' + esc(doc.sent_to_name || 'Unnamed') + '</h4>';
                const statusClass = doc.status === 'signed' ? 'badge-signed' : 'badge-pending';
                html += '<span class="badge ' + statusClass + '">' + esc(doc.status || 'unknown') + '</span>';
                html += '</div>';

                // Show the populated addendum HTML (already rendered with guarantor's data)
                if (doc.populated_html) {
                    html += '<div style="margin-top:8px;">' + doc.populated_html + '</div>';
                } else {
                    html += '<p style="color:#64748B;padding:16px;">Document HTML not available.</p>';
                }

                if (doc.status === 'signed') {
                    html += '<div class="signature-line">';
                    html += '<strong>Signed by ' + esc(doc.sent_to_name || '') + '</strong> — ' + esc(doc.sent_to_email || '') + '<br>';
                    html += 'Signing token: <code>' + esc(doc.signing_token || '') + '</code>';
                    html += '</div>';
                }
                html += '</div>';
            });

            html += '</section>';
            return html;
        }

        function renderCoverPage(app, deal) {
            const fd = app.form_data || {};
            return '<div class="cover">' +
                '<h1>Alliance Financing Group Ltd.</h1>' +
                '<div class="subtitle">Commercial Finance Brokerage · Est. 1989</div>' +
                '<div class="package-title">Lender Submission Package</div>' +
                '<div class="summary-box">' +
                '<h3>Deal Summary</h3>' +
                '<table>' +
                '<tr><td>Application ID</td><td>' + esc(fd.applicationId || app.id) + '</td></tr>' +
                '<tr><td>Business</td><td>' + esc(fd.legalName || app.business_name || '') + '</td></tr>' +
                '<tr><td>Financing Type</td><td>' + esc((fd.formType || app.form_type || '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())) + '</td></tr>' +
                '<tr><td>Amount Requested</td><td>' + fmtMoney(fd.advanceAmount || app.funding_amount_requested) + '</td></tr>' +
                '<tr><td>Status</td><td>' + esc(deal ? deal.status : app.status) + '</td></tr>' +
                '<tr><td>Package Generated</td><td>' + fmtDate(new Date().toISOString()) + '</td></tr>' +
                '</table>' +
                '</div>' +
                '<p style="margin-top:32px;color:#64748B;font-size:12px;">Confidential — prepared by Alliance Financing Group Ltd. for prospective lender review.</p>' +
                '</div>';
        }

        async function loadPackage() {
            if (!dealId) {
                showError('Missing deal_id URL parameter. Use ?deal_id=&lt;uuid&gt;');
                return;
            }

            try {
                // Query the deal
                const { data: deal, error: dealErr } = await sb
                    .from('deals')
                    .select('*')
                    .eq('id', dealId)
                    .single();
                if (dealErr) throw new Error('Deal lookup failed: ' + dealErr.message);
                if (!deal) throw new Error('No deal found for deal_id ' + dealId);

                // Query the application
                const { data: app, error: appErr } = await sb
                    .from('applications')
                    .select('*')
                    .eq('id', deal.application_id)
                    .single();
                if (appErr) throw new Error('Application lookup failed: ' + appErr.message);
                if (!app) throw new Error('No application found for this deal');

                // Query signing_documents for this deal (all statuses, display shows what's signed)
                const { data: signingDocs, error: sdErr } = await sb
                    .from('signing_documents')
                    .select('*')
                    .eq('deal_id', dealId)
                    .order('created_at', { ascending: true });
                if (sdErr) console.warn('Signing documents lookup warning: ' + sdErr.message);

                // Build the package HTML
                let html = renderCoverPage(app, deal);
                html += renderApplicationSection(app, deal);
                html += renderPGSection(signingDocs || []);

                // Footer disclaimer
                html += '<div class="footer-disclaimer">' +
                    'Alliance Financing Group Ltd. is a commercial finance brokerage, not a direct lender.<br>' +
                    'All financing is subject to lender underwriting, approval, and credit requirements.<br>' +
                    'Alliance Financing Group Ltd. · 1-877-660-3660 · alliancefinancing.com' +
                    '</div>';

                document.getElementById('packageRoot').innerHTML = html;
                document.title = 'Lender Package — ' + (app.form_data?.legalName || app.business_name || 'Alliance Financing Group');
            } catch (err) {
                console.error(err);
                showError(err.message || 'Unknown error');
            }
        }

        loadPackage();
    </script>
</body>
</html>
