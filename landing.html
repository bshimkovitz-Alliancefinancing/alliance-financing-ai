<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance Financing Group - AI-Powered Business Funding</title>
    <meta name="description" content="Alliance Financing Group - AI-powered business funding platform. Partners can log in to access their dashboard.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0D1E3D;
            --navy-light: #1a2d52;
            --gold: #C9A84C;
            --gold-hover: #d4b65e;
            --slate-400: #94A3B8;
            --slate-200: #E2E8F0;
            --slate-600: #475569;
            --slate-700: #334155;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #0D1E3D 0%, #162a4a 40%, #0D1E3D 100%);
            min-height: 100vh;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(201, 168, 76, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(201, 168, 76, 0.03) 0%, transparent 50%);
            animation: slowDrift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-2%, -1%); }
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 2rem 2rem 0;
            text-align: center;
        }

        .logo-img {
            height: 55px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        /* Main content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 3rem;
        }

        .hero-section {
            text-align: center;
            max-width: 600px;
        }

        .hero-section h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.75rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #C9A84C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-section p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: var(--slate-400);
            max-width: 480px;
            margin: 0 auto 2rem;
        }

        .contact-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate-400);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .contact-item:hover {
            color: var(--gold);
        }

        .contact-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Login card */
        .login-section {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 2rem;
        }

        .login-card h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.375rem;
            text-align: center;
        }

        .login-card .subtitle {
            color: var(--slate-400);
            font-size: 0.8125rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--slate-400);
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0.625rem;
            color: var(--white);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--gold);
            color: var(--navy);
            font-size: 0.9375rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 0.625rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: var(--gold-hover);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            color: #FCA5A5;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .success-message {
            background: rgba(34, 197, 94, 0.15);
            color: #86EFAC;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .login-links {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .login-links a {
            color: var(--gold);
            font-size: 0.8125rem;
            text-decoration: none;
            font-weight: 500;
        }

        .login-links a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8125rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(13, 30, 61, 0.3);
            border-radius: 50%;
            border-top-color: var(--navy);
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero-section h1 {
                font-size: 2rem;
            }

            .hero-section p {
                font-size: 1rem;
            }

            .main-content {
                gap: 2rem;
                padding: 1.5rem;
            }

            .login-card {
                padding: 1.5rem;
            }

            .contact-bar {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Layout switch for larger screens */
        @media (min-width: 900px) {
            .main-content {
                flex-direction: row;
                justify-content: center;
                align-items: center;
                gap: 5rem;
                padding: 3rem;
            }

            .hero-section {
                text-align: left;
            }

            .hero-section p {
                margin: 0 0 2rem 0;
            }

            .contact-bar {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <img src="alliance-logo-transparent.png" alt="Alliance Financing Group" class="logo-img">
        </header>

        <div class="main-content">
            <!-- Left: Hero content -->
            <div class="hero-section">
                <h1>35 Years of Commercial Financing Expertise</h1>
                <div class="contact-bar">
                    <a href="tel:+18776603660" class="contact-item">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        1-877-660-3660 ext. 222
                    </a>
                    <a href="mailto:info@alliancefinancing.com" class="contact-item">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        info@alliancefinancing.com
                    </a>
                </div>
            </div>

            <!-- Right: Login card -->
            <div class="login-section">
                <div class="login-card">
                    <!-- Login Form -->
                    <div id="loginView">
                        <h3>Partner Login</h3>
                        <p class="subtitle">Access your agent dashboard</p>

                        <div id="loginError" class="error-message"></div>

                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="loginEmail">Email</label>
                                <input type="email" id="loginEmail" name="email" placeholder="you@company.com" required autocomplete="email">
                            </div>
                            <div class="form-group">
                                <label for="loginPassword">Password</label>
                                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                        </form>

                        <div class="login-links">
                            <a href="#" onclick="showForgotPassword(event)">Forgot your password?</a>
                        </div>
                    </div>

                    <!-- Forgot Password Form -->
                    <div id="forgotView" style="display:none;">
                        <h3>Reset Password</h3>
                        <p class="subtitle">Enter your email for a reset link</p>

                        <div id="forgotError" class="error-message"></div>
                        <div id="forgotSuccess" class="success-message"></div>

                        <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                            <div class="form-group">
                                <label for="forgotEmail">Email</label>
                                <input type="email" id="forgotEmail" name="email" placeholder="you@company.com" required autocomplete="email">
                            </div>
                            <button type="submit" class="btn-login" id="forgotBtn">Send Reset Link</button>
                        </form>

                        <div class="login-links">
                            <a href="#" onclick="showLoginForm(event)">Back to Sign In</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 Alliance Financing Group Ltd. All rights reserved.
        </footer>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uernphejrcsicnkobsdw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlcm5waGVqcmNzaWNua29ic2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzU3ODksImV4cCI6MjA4NjUxMTc4OX0.A2YN3gkaYwR_9nyE3OkWl5Io9tfxe8lTgC913stXmUI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            try {
                errorEl.style.display = 'none';
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Signing in...';

                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;

                window.location.href = 'dashboard.html';

            } catch (error) {
                errorEl.textContent = error.message || 'Login failed. Please check your credentials.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const errorEl = document.getElementById('forgotError');
            const successEl = document.getElementById('forgotSuccess');
            const btn = document.getElementById('forgotBtn');

            try {
                errorEl.style.display = 'none';
                successEl.style.display = 'none';
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Sending...';

                const { error } = await db.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/dashboard.html'
                });
                if (error) throw error;

                successEl.textContent = 'Check your email for a password reset link.';
                successEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';

            } catch (error) {
                errorEl.textContent = error.message || 'Failed to send reset email.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }

        function showForgotPassword(e) {
            e.preventDefault();
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('forgotView').style.display = 'block';
        }

        function showLoginForm(e) {
            e.preventDefault();
            document.getElementById('forgotView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
        }

        // Check if already logged in
        (async function() {
            try {
                const { data: { session } } = await db.auth.getSession();
                if (session) {
                    window.location.href = 'dashboard.html';
                    return;
                }
            } catch (e) {
                console.log('Session check error:', e);
            }
        })();
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JEP3FEBY4V"></script>

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JEP3FEBY4V');
    </script>
</body>
</html>
